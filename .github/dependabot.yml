version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [deps, root]
    commit-message:
      prefix: 'chore(deps)'
      include: scope

  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [deps, server]
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    ignore:
      # Major version bumps for these require manual migration work
      - dependency-name: "mongoose"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      types:
        patterns:
          - '@types/*'
      express:
        patterns:
          - 'express'
          - 'express-*'
          - 'connect-*'
          - 'cors'
          - 'helmet'
          - 'cookie-parser'
      dev-tools:
        patterns:
          - 'typescript'
          - 'typescript-eslint'
          - 'eslint*'
          - '@eslint/*'
          - 'prettier'
          - 'tsx'
          - 'vitest'
          - '@vitest/*'
      pino:
        patterns:
          - 'pino'
          - 'pino-*'

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [deps, client]
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    ignore:
      # Major version bumps for these require manual migration work
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - 'react-*'
          - '@types/react'
          - '@types/react-dom'
      tanstack:
        patterns:
          - '@tanstack/*'
      radix:
        patterns:
          - '@radix-ui/*'
      types:
        patterns:
          - '@types/*'
      dev-tools:
        patterns:
          - 'typescript'
          - 'typescript-eslint'
          - 'eslint*'
          - '@eslint/*'
          - 'prettier'
          - 'vite'
          - '@vitejs/*'
          - 'vitest'
          - '@vitest/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [deps, ci]
    commit-message:
      prefix: 'chore(ci)'

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    labels: [deps, docker]
    commit-message:
      prefix: 'chore(docker)'
