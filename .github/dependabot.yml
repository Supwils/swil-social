version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [deps, root]
    commit-message:
      prefix: 'chore(deps)'
      include: scope

  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [deps, server]
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    groups:
      types:
        patterns:
          - '@types/*'

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [deps, client]
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      tanstack:
        patterns:
          - '@tanstack/*'
      radix:
        patterns:
          - '@radix-ui/*'
      types:
        patterns:
          - '@types/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [deps, ci]
    commit-message:
      prefix: 'chore(ci)'

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    labels: [deps, docker]
    commit-message:
      prefix: 'chore(docker)'
