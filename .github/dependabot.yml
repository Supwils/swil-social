version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels: [deps, root]
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    groups:
      root-all:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels: [deps, server]
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    ignore:
      # Major version bumps for these require manual migration work
      - dependency-name: "mongoose"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "connect-mongo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "helmet"
        update-types: ["version-update:semver-major"]
    groups:
      server-all:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels: [deps, client]
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    ignore:
      # Major version bumps for these require manual migration work
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      client-all:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels: [deps, ci]
    commit-message:
      prefix: 'chore(ci)'
    groups:
      actions-all:
        patterns:
          - '*'

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels: [deps, docker]
    commit-message:
      prefix: 'chore(docker)'
    groups:
      docker-all:
        patterns:
          - '*'
