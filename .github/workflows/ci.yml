name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  typecheck:
    name: Typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json

      - name: Install root deps
        run: npm ci --no-audit --no-fund

      - name: Install server deps
        run: npm --prefix server ci --no-audit --no-fund

      - name: Install client deps
        run: npm --prefix client ci --no-audit --no-fund

      - name: Typecheck (server)
        run: npm --prefix server run typecheck

      - name: Typecheck (client)
        run: npm --prefix client run typecheck

      - name: Build server
        run: npm --prefix server run build

      - name: Build client
        run: npm --prefix client run build
        env:
          # Keep build env minimal — no secrets needed at build time.
          VITE_API_BASE: /api/v1

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: swil-social:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
