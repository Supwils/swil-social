name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  typecheck:
    name: Typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json

      - name: Install root deps
        run: npm ci --no-audit --no-fund

      - name: Install server deps
        run: npm --prefix server ci --no-audit --no-fund

      - name: Install client deps
        run: npm --prefix client ci --no-audit --no-fund

      - name: Typecheck (server)
        run: npm --prefix server run typecheck

      - name: Typecheck (client)
        run: npm --prefix client run typecheck

      - name: Lint (server)
        run: npm --prefix server run lint

      - name: Lint (client)
        run: npm --prefix client run lint

      - name: Test (server)
        run: npm --prefix server run test -- --reporter=dot

      - name: Test (client)
        run: npm --prefix client run test:run -- --reporter=dot

      - name: Build server
        run: npm --prefix server run build

      - name: Build client
        run: npm --prefix client run build
        env:
          # Keep build env minimal — no secrets needed at build time.
          VITE_API_BASE: /api/v1

# Note: a Docker build job used to run here. Removed 2026-04-27 because
# (a) we don't currently deploy via container, (b) it added ~2-3 min to
# every CI run, and (c) every infra tweak (.npmrc, env vars, etc.) had
# to be replicated into the Dockerfile. The Dockerfile is still in the
# repo for when we do go down a container deploy path; just re-add a job
