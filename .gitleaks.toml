# gitleaks configuration — extends the bundled default ruleset.
#
# Default rules cover AWS keys, GitHub tokens, GCP keys, Stripe keys, JWT,
# private keys, MongoDB connection strings, generic high-entropy api_key
# patterns, etc. We only allowlist files that intentionally contain
# placeholder / example secrets.
#
# IMPORTANT: do NOT add allowlist entries to silence a new real leak —
# rotate the secret and remove it from the staged diff. The allowlist
# is only for files that contain *placeholder* values by design.

title = "swil-social gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Project-wide allowlist for files with placeholder secrets"

paths = [
  # Example env files contain shaped placeholder values by design
  '''(^|/)\.env\.example$''',
  '''(^|/).+/\.env\.example$''',

  # Docs may discuss key shapes / examples
  '''(^|/)agent/auth\.md$''',
  '''(^|/)agent/api-reference\.md$''',
  '''(^|/)docs/.+\.md$''',
  '''(^|/)README\.md$''',
  '''(^|/)CHANGELOG\.md$''',

  # Build artifacts and lockfiles
  '''(^|/)client/dist/''',
  '''(^|/)server/dist/''',
  '''(^|/)node_modules/''',
  '''(^|/)package-lock\.json$''',
]
